<script>
  (() => {
    const form = document.getElementById('analysis-period-form');
    if (!form) return;

    const modeInput = document.getElementById('selection-mode-input');
    const monthInput = document.getElementById('analysis-month-input');
    const applyButton = document.getElementById('analysis-apply-button');
    const clearOnEmptyInputs = Array.from(form.querySelectorAll('input[data-clear-on-empty="true"]'));
    const panels = {
      closed: document.getElementById('panel-closed'),
      month: document.getElementById('panel-month'),
      custom: document.getElementById('panel-custom'),
    };
    const buttons = Array.from(form.querySelectorAll('.period-tab'));
    const customInputs = panels.custom ? Array.from(panels.custom.querySelectorAll('input')) : [];
    const filterDropdowns = Array.from(form.querySelectorAll('.analysis-filter-dropdown'));

    const getSelectedFilterCount = () => (
      filterDropdowns.reduce((count, dropdown) => (
        count + dropdown.querySelectorAll('input[type="checkbox"]:checked').length
      ), 0)
    );

    const syncContextInputs = () => {
      const selectedFilterCount = getSelectedFilterCount();
      clearOnEmptyInputs.forEach((input) => {
        input.disabled = selectedFilterCount === 0;
      });
    };

    const setMode = (mode) => {
      modeInput.value = mode;
      buttons.forEach((button) => {
        const isActive = button.dataset.mode === mode;
        button.classList.toggle('period-tab-active', isActive);
      });
      Object.entries(panels).forEach(([panelMode, panel]) => {
        if (!panel) return;
        panel.style.display = panelMode === mode ? '' : 'none';
      });
      if (monthInput) monthInput.disabled = mode !== 'month';
      customInputs.forEach((input) => {
        input.disabled = mode !== 'custom';
      });
    };

    const serializeState = () => {
      syncContextInputs();
      const state = {
        mode: modeInput ? modeInput.value : 'closed',
        month: '',
        periodStart: '',
        periodEnd: '',
        selectedCategories: [],
      };

      if (state.mode === 'month' && monthInput) {
        state.month = monthInput.value || '';
      }
      if (state.mode === 'custom') {
        const [startInput, endInput] = customInputs;
        state.periodStart = startInput ? startInput.value || '' : '';
        state.periodEnd = endInput ? endInput.value || '' : '';
      }

      filterDropdowns.forEach((dropdown) => {
        dropdown.querySelectorAll('input[type="checkbox"]:checked').forEach((checkbox) => {
          state.selectedCategories.push(checkbox.value);
        });
      });
      state.selectedCategories.sort();
      return JSON.stringify(state);
    };

    const initialState = serializeState();

    const syncApplyState = () => {
      const isDirty = serializeState() !== initialState;
      if (applyButton) {
        applyButton.disabled = !isDirty;
      }
    };

    buttons.forEach((button) => {
      button.addEventListener('click', () => {
        setMode(button.dataset.mode);
        syncApplyState();
      });
    });

    if (monthInput) {
      monthInput.addEventListener('change', syncApplyState);
    }

    customInputs.forEach((input) => {
      input.addEventListener('input', syncApplyState);
      input.addEventListener('change', syncApplyState);
    });

    filterDropdowns.forEach((dropdown) => {
      const checkboxes = Array.from(dropdown.querySelectorAll('input[type="checkbox"]'));
      dropdown.querySelectorAll('[data-dropdown-action]').forEach((button) => {
        button.addEventListener('click', () => {
          const action = button.dataset.dropdownAction;
          if (action === 'select_all') {
            checkboxes.forEach((checkbox) => {
              checkbox.checked = true;
            });
          } else if (action === 'clear_all') {
            checkboxes.forEach((checkbox) => {
              checkbox.checked = false;
            });
          }
          syncApplyState();
        });
      });
      checkboxes.forEach((checkbox) => {
        checkbox.addEventListener('change', syncApplyState);
      });
    });

    form.addEventListener('submit', () => {
      syncContextInputs();
    });

    setMode(modeInput ? modeInput.value : 'closed');
    syncApplyState();
  })();
</script>

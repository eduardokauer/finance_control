{% macro page_header(eyebrow, title, intro='', actions_class='') -%}
  {% set actions_markup = caller()|trim if caller is defined else '' %}
  <section class="page-header">
    <div class="page-header-copy">
      <h1 class="page-title">{{ title }}</h1>
      {% if intro %}
        <p class="page-intro">{{ intro }}</p>
      {% endif %}
    </div>
    {% if actions_markup %}
      <div class="page-actions{% if actions_class %} {{ actions_class }}{% endif %}">
        {{ actions_markup|safe }}
      </div>
    {% endif %}
  </section>
{%- endmacro %}

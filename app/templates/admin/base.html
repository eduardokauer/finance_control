<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Admin{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    :root {
      --bg: #f5efe2;
      --surface: #fffdf7;
      --surface-strong: #ffffff;
      --ink: #1f2933;
      --muted: #66788a;
      --line: #dbcdb3;
      --accent: #0f766e;
      --accent-soft: #d9f3ef;
      --warn: #b45309;
      --warn-soft: #fff1d6;
      --danger: #b42318;
      --danger-soft: #fee4e2;
      --ok: #18794e;
      --shadow: 0 12px 30px rgba(31, 41, 51, 0.08);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Calibri, "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(180deg, #f2ead8 0%, #f8f4ec 35%, #f3efe6 100%);
      color: var(--ink);
    }
    a { color: inherit; }
    .shell {
      max-width: 1080px;
      margin: 0 auto;
      padding: 16px 14px 80px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }
    .topbar-start {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand {
      font-size: 1.25rem;
      font-weight: 700;
      text-decoration: none;
    }
    .nav-shell {
      position: relative;
      margin-bottom: 18px;
    }
    .nav-toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      background: rgba(255, 253, 247, 0.96);
      color: var(--ink);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 0.95rem;
      cursor: pointer;
      box-shadow: var(--shadow);
    }
    .nav-toggle-lines {
      display: inline-grid;
      gap: 4px;
    }
    .nav-toggle-lines span {
      width: 16px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
      display: block;
    }
    .nav-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(31, 41, 51, 0.28);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
      z-index: 19;
    }
    .nav-backdrop.is-open {
      opacity: 1;
      pointer-events: auto;
    }
    .nav {
      position: fixed;
      top: 16px;
      left: 16px;
      bottom: 16px;
      width: min(360px, calc(100vw - 32px));
      display: grid;
      gap: 12px;
      padding: 14px 16px;
      background: rgba(255, 253, 247, 0.96);
      border: 1px solid rgba(219, 205, 179, 0.9);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      overflow-y: auto;
      transform: translateX(calc(-100% - 24px));
      transition: transform 0.2s ease;
      z-index: 20;
    }
    .nav.is-open {
      transform: translateX(0);
    }
    .nav-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .nav-section-label {
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      min-width: 106px;
    }
    .nav a, .nav button, .button, .nav-group summary {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      text-decoration: none;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .nav-group {
      position: relative;
    }
    .nav-group summary {
      list-style: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .nav-group summary::-webkit-details-marker {
      display: none;
    }
    .nav-group summary::after {
      content: "▾";
      font-size: 0.8rem;
      color: var(--muted);
    }
    .nav-group[open] summary {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: #a8dfd5;
    }
    .nav-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(219, 205, 179, 0.9);
      margin-bottom: 4px;
    }
    .nav-title {
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .nav-close {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
    }
    .nav-submenu {
      display: grid;
      gap: 8px;
      margin-top: 8px;
      margin-left: 114px;
      padding: 10px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 253, 247, 0.98);
    }
    .nav-submenu a {
      border-radius: 14px;
      padding: 10px 12px;
      border: 1px solid transparent;
    }
    .nav-submenu a:hover {
      border-color: var(--line);
      background: var(--surface);
    }
    .nav-link-active {
      background: var(--accent-soft) !important;
      color: var(--accent) !important;
      border-color: #a8dfd5 !important;
      font-weight: 700;
    }
    .button-primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .button-danger {
      background: var(--danger-soft);
      color: var(--danger);
      border-color: #f7b4ae;
    }
    button[disabled], .button[aria-disabled="true"] {
      opacity: 0.72;
      cursor: wait;
    }
    .is-loading {
      position: relative;
      pointer-events: none;
    }
    .is-loading::after {
      content: "";
      width: 14px;
      height: 14px;
      margin-left: 8px;
      display: inline-block;
      vertical-align: -2px;
      border-radius: 999px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      animation: button-spin 0.7s linear infinite;
    }
    .card, .panel {
      background: rgba(255, 253, 247, 0.96);
      border: 1px solid rgba(219, 205, 179, 0.9);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
    }
    .grid {
      display: grid;
      gap: 12px;
    }
    .grid-2 {
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }
    .grid-3 {
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }
    .metric-value {
      font-size: 1.8rem;
      font-weight: 700;
      margin-top: 6px;
    }
    .subtle {
      color: var(--muted);
      font-size: 0.92rem;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.82rem;
    }
    .badge.warn { background: var(--warn-soft); color: var(--warn); }
    .badge.ok { background: var(--accent-soft); color: var(--accent); }
    .badge.danger { background: var(--danger-soft); color: var(--danger); }
    form { margin: 0; }
    label {
      display: grid;
      gap: 6px;
      font-size: 0.92rem;
      color: var(--muted);
    }
    input, select, textarea {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 12px 14px;
      background: var(--surface-strong);
      font: inherit;
      color: var(--ink);
    }
    textarea { min-height: 90px; }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .card-list {
      display: grid;
      gap: 12px;
    }
    .tx-card header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .amount-negative { color: #9f1239; font-weight: 700; }
    .amount-positive { color: var(--ok); font-weight: 700; }
    .stack { display: grid; gap: 10px; }
    .inline { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .flash {
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--accent-soft);
      color: var(--accent);
      margin-bottom: 14px;
      border: 1px solid #a8dfd5;
    }
    .tableish {
      display: grid;
      gap: 10px;
    }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      padding: 10px 12px;
      text-align: left;
      border-top: 1px solid var(--line);
      vertical-align: top;
    }
    th {
      font-size: 0.86rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    tbody tr:first-child td { border-top: 1px solid var(--line); }
    .kv-grid {
      display: grid;
      grid-template-columns: minmax(130px, 190px) minmax(0, 1fr);
      gap: 10px 12px;
      align-items: start;
    }
    code {
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.9em;
      word-break: break-all;
    }
    .accordion {
      overflow: hidden;
    }
    .accordion summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
      list-style: none;
      font-weight: 700;
    }
    .accordion summary::-webkit-details-marker {
      display: none;
    }
    .accordion summary::after {
      content: "+";
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface);
      font-size: 1.1rem;
      line-height: 1;
    }
    .accordion[open] summary::after {
      content: "-";
    }
    .accordion-body {
      margin-top: 14px;
    }
    .rule-row, .category-row {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      margin-top: 12px;
    }
    .section-title {
      margin: 0 0 6px 0;
      font-size: 1.15rem;
    }
    .section-intro {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
    }
    .login-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .login-card {
      width: min(420px, 100%);
      background: rgba(255, 253, 247, 0.97);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 24px;
    }
    @keyframes button-spin {
      to { transform: rotate(360deg); }
    }
    @media (min-width: 860px) {
      .shell { padding: 28px 24px 80px; }
      .tx-card { padding: 18px 18px; }
    }
    @media (max-width: 720px) {
      .nav-submenu { margin-left: 0; }
      .nav-section-label { min-width: auto; width: 100%; }
    }
  </style>
</head>
<body>
  {% block body %}
  <div class="shell">
    <div class="topbar">
      <div class="topbar-start">
        <button type="button" class="nav-toggle" data-nav-toggle aria-expanded="false" aria-controls="admin-nav">
          <span class="nav-toggle-lines" aria-hidden="true"><span></span><span></span><span></span></span>
          <span>Menu</span>
        </button>
        <a href="/admin" class="brand">Finance Control Admin</a>
      </div>
      <form method="post" action="/admin/logout">
        <button type="submit">Sair</button>
      </form>
    </div>
    <div class="nav-shell">
      <div class="nav-backdrop" data-nav-backdrop></div>
      <nav class="nav" id="admin-nav" data-admin-nav>
      <div class="nav-header">
        <div class="nav-title">Navegação</div>
        <button type="button" class="nav-close" data-nav-close aria-label="Fechar menu">×</button>
      </div>
      <div class="nav-row">
        <span class="nav-section-label">Visão geral</span>
        <a href="/admin" class="{% if request.url.path == '/admin' or request.url.path == '/admin/' or request.url.path.startswith('/admin/analysis') %}nav-link-active{% endif %}">Home</a>
        <a href="/admin/operations" class="{% if request.url.path.startswith('/admin/operations') %}nav-link-active{% endif %}">Central</a>
      </div>
      <div class="nav-row">
        <span class="nav-section-label">Operação</span>
        <a href="/admin/transactions" class="{% if request.url.path.startswith('/admin/transactions') %}nav-link-active{% endif %}">Lançamentos</a>
        <a href="/admin/transactions?uncategorized_only=true">Não categorizados</a>
        <a href="/admin/reapply" class="{% if request.url.path.startswith('/admin/reapply') %}nav-link-active{% endif %}">Reaplicar regras</a>
        <a href="/admin/credit-card-invoices" class="{% if request.url.path.startswith('/admin/credit-card-invoices') %}nav-link-active{% endif %}">Faturas</a>
      </div>
      <div class="nav-row">
        <span class="nav-section-label">Configuração</span>
        <details class="nav-group" {% if request.url.path.startswith('/admin/rules') or request.url.path.startswith('/admin/categories') %}open{% endif %}>
          <summary>Regras e categorias</summary>
          <div class="nav-submenu">
            <a href="/admin/rules" class="{% if request.url.path.startswith('/admin/rules') %}nav-link-active{% endif %}">Regras</a>
            <a href="/admin/categories" class="{% if request.url.path.startswith('/admin/categories') %}nav-link-active{% endif %}">Categorias</a>
          </div>
        </details>
      </div>
      </nav>
    </div>
    {% if flash %}<div class="flash">{{ flash }}</div>{% endif %}
    {% block content %}{% endblock %}
  </div>
  {% endblock %}
  <script>
    (() => {
      const nav = document.querySelector('[data-admin-nav]');
      const navBackdrop = document.querySelector('[data-nav-backdrop]');
      const navToggle = document.querySelector('[data-nav-toggle]');
      const navClose = document.querySelector('[data-nav-close]');

      function setNavOpen(open) {
        if (!nav || !navBackdrop || !navToggle) return;
        nav.classList.toggle('is-open', open);
        navBackdrop.classList.toggle('is-open', open);
        navToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
        document.body.style.overflow = open ? 'hidden' : '';
      }

      navToggle?.addEventListener('click', () => {
        setNavOpen(!nav.classList.contains('is-open'));
      });

      navClose?.addEventListener('click', () => setNavOpen(false));
      navBackdrop?.addEventListener('click', () => setNavOpen(false));
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') setNavOpen(false);
      });
      nav?.querySelectorAll('a').forEach((link) => {
        link.addEventListener('click', () => setNavOpen(false));
      });

      function setLoadingState(button, enabled) {
        if (!button) return;
        if (enabled) {
          if (button.dataset.loadingActive === "true") return;
          button.dataset.loadingActive = "true";
          button.dataset.originalLabel = button.textContent.trim();
          button.textContent = button.dataset.loadingLabel || button.dataset.originalLabel || "Carregando...";
          button.classList.add("is-loading");
          if ("disabled" in button) button.disabled = true;
          else button.setAttribute("aria-disabled", "true");
          return;
        }
        if (button.dataset.loadingActive !== "true") return;
        button.textContent = button.dataset.originalLabel || button.textContent;
        button.classList.remove("is-loading");
        if ("disabled" in button) button.disabled = false;
        else button.removeAttribute("aria-disabled");
        delete button.dataset.loadingActive;
      }

      document.addEventListener("submit", (event) => {
        const button = event.submitter;
        if (!button || !button.matches("[data-loading-button]")) return;
        setLoadingState(button, true);
      }, true);

      document.addEventListener("click", (event) => {
        const button = event.target.closest("[data-loading-button]");
        if (!button || button.type === "submit") return;
        setLoadingState(button, true);
      });

      function clearHtmxLoading(event) {
        const elt = event.detail.elt;
        if (!elt) return;
        const button = elt.matches?.("[data-loading-button]") ? elt : elt.closest?.("[data-loading-button]");
        if (button && button.matches("[data-loading-button]")) {
          setLoadingState(button, false);
        }
      }

      document.body.addEventListener("htmx:afterRequest", clearHtmxLoading);
      document.body.addEventListener("htmx:responseError", clearHtmxLoading);
    })();
  </script>
</body>
</html>
